<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Đăng nhập - VNMobil</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
          href="css/style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a href="index.html"
           class="navbar-brand fw-bold">

            <i class="bi bi-car-front-fill"></i>
            VNMobil

        </a>
    </div>
</nav>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-md-5">

<div class="form-card">

<h2 class="text-center mb-4">

Đăng Nhập

</h2>

<form id="loginForm">

<div class="mb-3">

<label class="form-label">

Tên đăng nhập

</label>

<input
type="text"
id="username"
class="form-control"
required>

</div>


<div class="mb-4">

<label class="form-label">

Mật khẩu

</label>

<input
type="password"
id="password"
class="form-control"
required>

</div>


<button class="btn btn-primary w-100">

Đăng nhập

</button>

</form>


<div class="text-center mt-4">

Chưa có tài khoản?

<a href="register.html">

Đăng ký ngay

</a>

</div>

</div>

</div>

</div>

</div>

<script src="js/login.js"></script>

</body>
</html>

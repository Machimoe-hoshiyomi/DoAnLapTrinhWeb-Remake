<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Đăng ký - VNMobil</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="css/style.css">

</head>
<body>


<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a href="index.html"
class="navbar-brand fw-bold">

🚗 VNMobil

</a>

</div>

</nav>


<div class="container py-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="form-card">

<h2 class="text-center mb-4">

Đăng Ký Tài Khoản

</h2>


<form id="registerForm">

<div class="mb-3">

<label>

Tên đăng nhập

</label>

<input
id="username"
class="form-control"
required>

</div>


<div class="mb-3">

<label>

Mật khẩu

</label>

<input
type="password"
id="password"
class="form-control"
required>

</div>


<div class="mb-3">

<label>

Họ và tên

</label>

<input
id="fullName"
class="form-control"
required>

</div>


<div class="mb-3">

<label>

Số điện thoại

</label>

<input
id="phone"
class="form-control"
required>

</div>


<div class="mb-4">

<label>

Email

</label>

<input
type="email"
id="email"
class="form-control"
required>

</div>


<button class="btn btn-success w-100">

Đăng ký

</button>

</form>

</div>

</div>

</div>

</div>


<script src="js/register.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Quản trị - VNMobil</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet"
href="css/style.css">

</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a href="index.html" class="navbar-brand fw-bold">
                <i class="bi bi-car-front-fill"></i> VNMobil Admin
            </a>
            <button class="btn btn-danger" onclick="localStorage.removeItem('user'); window.location.replace('login.html');">
                Đăng xuất
            </button>
        </div>
    </nav>


<div class="container py-5">

<!-- Statistics -->

<div class="row g-4 mb-5">

<div class="col-md-3">

<div class="stat-card bg-blue">

<h5>🚗 Tổng số xe</h5>

<h2 id="totalCars">

0

</h2>

</div>

</div>


<div class="col-md-3">

<div class="stat-card bg-green">

<h5>📅 Tổng lịch hẹn</h5>

<h2 id="totalAppointments">

0

</h2>

</div>

</div>


<div class="col-md-3">

<div class="stat-card bg-dark2">

<h5>✅ Đã xử lý</h5>

<h2 id="doneCount">

0

</h2>

</div>

</div>


<div class="col-md-3">

<div class="stat-card bg-red">

<h5>❌ Đã hủy</h5>

<h2 id="cancelCount">

0

</h2>

</div>

</div>

</div>


<!-- Car Management -->

<div class="form-card mb-5">

<h3 class="mb-4">

Quản Lý Xe

</h3>

<div class="row g-3">

<div class="col-md-2">

<input
id="carName"
class="form-control"
placeholder="Tên xe">

</div>


<div class="col-md-2">

<input
id="brandName"
class="form-control"
placeholder="Hãng xe">

</div>


<div class="col-md-2">

<input
id="price"
class="form-control"
placeholder="Giá">

</div>


<div class="col-md-3">

<input
id="specs"
class="form-control"
placeholder="Thông số">

</div>


<div class="col-md-2">

<input
id="imageUrl"
class="form-control"
placeholder="Ảnh">

</div>


<div class="col-md-1">

<button
id="addCarBtn"
class="btn btn-success">

Thêm

</button>

</div>

</div>


<div class="table-responsive mt-4">

<table class="table table-bordered">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Tên xe</th>
<th>Hãng</th>
<th>Giá</th>
<th>Thao tác</th>

</tr>

</thead>

<tbody id="carTable">

</tbody>

</table>

</div>

</div>


<!-- Appointment -->

<div class="form-card">

<h3 class="mb-4">

Quản Lý Lịch Hẹn

</h3>


<div class="table-responsive">

<table class="table table-bordered">

<thead class="table-dark">

<tr>

<th>Khách hàng</th>
<th>Xe</th>
<th>Ngày</th>
<th>Trạng thái</th>
<th>Thao tác</th>

</tr>

</thead>

<tbody id="appointmentTable">

</tbody>

</table>

</div>

</div>

</div>

<script src="js/admin.js"></script>

</body>
</html>
